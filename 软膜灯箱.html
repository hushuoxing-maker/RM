<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古月AI智能体·彩色软膜灯箱灵感库</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://unpkg.com/lucide@latest">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            font-family: 'Inter', "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fdfcfd;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .prompt-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .prompt-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(236, 72, 153, 0.1);
        }
        .tag-en {
            background: #EEF2FF;
            color: #4F46E5;
        }
        .tag-zh {
            background: #FFF1F2;
            color: #E11D48;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(236, 72, 153, 0);
            }
        }
        .btn-generating {
            animation: pulse-glow 1.5s infinite;
            pointer-events: none;
            opacity: 0.8;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in {
            animation: fadeInUp 0.5s ease forwards;
        }
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: #059669;
        }
    </style>
</head>
<body class="pb-20 text-slate-800">

    <div id="toast" class="toast"></div>

    <nav class="sticky top-0 z-50 glass-card border-b border-pink-50/60 px-4 sm:px-6 py-3 sm:py-4">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-br from-pink-500 to-violet-600 p-1.5 rounded-lg text-white">
                    <i data-lucide="layout-dashboard"></i>
                </div>
                <h1 class="font-extrabold text-lg sm:text-xl tracking-tight italic">
                    GUYUE <span class="text-pink-500 text-sm font-normal not-italic">BI-LINGUAL</span>
                </h1>
            </div>
            <div class="flex gap-2 flex-wrap justify-center">
                <button onclick="copyAll('zh')"
                class="text-xs font-bold border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition active:scale-95"
                title="复制全部中文提示词">
                <i data-lucide="file-text" class="w-3.5 h-3.5 inline mr-1"></i> 复制全部中文
            </button>
            <button onclick="copyAll('en')"
            class="text-xs font-bold bg-slate-900 text-white px-3 py-2 rounded-lg hover:bg-slate-800 transition active:scale-95"
            title="Copy All English Prompts">
            <i data-lucide="file-text" class="w-3.5 h-3.5 inline mr-1"></i> COPY ALL ENGLISH
        </button>
        <button onclick="exportAll()"
        class="text-xs font-bold border border-pink-200 text-pink-600 px-3 py-2 rounded-lg hover:bg-pink-50 transition active:scale-95"
        title="导出为文本文件">
        <i data-lucide="download" class="w-3.5 h-3.5 inline mr-1"></i> 导出
    </button>
</div>
</div>
</nav>

<header class="max-w-4xl mx-auto px-4 sm:px-6 pt-8 sm:pt-12 text-center">
    <div class="inline-block px-4 py-1.5 mb-4 rounded-full bg-pink-50 text-pink-600 text-xs font-bold tracking-widest uppercase">
        Premium Design Assets
    </div>
    <h2 class="text-2xl sm:text-4xl font-extrabold mb-6 tracking-tight text-slate-900">
        古月AI智能体·彩色软膜灯箱灵感库
    </h2>
    <p class="text-slate-500 text-sm sm:text-base mb-6 max-w-2xl mx-auto leading-relaxed">
        输入店铺行业，一键批量生成<strong class="text-pink-500">中英双语</strong>软膜灯箱AI提示词，自动嵌入<strong>无结构外露、无锈蚀、文字锁定</strong>等硬性约束，且本次生成的提示词互不重复。
    </p>

    <div class="glass-card rounded-3xl p-5 sm:p-6 shadow-xl mb-6">
        <div class="flex flex-col md:flex-row gap-3 sm:gap-4 mb-3">
            <input type="text" id="industryInput" placeholder="请输入店铺行业（如：日式拉面、精品美容院...）"
            class="flex-grow bg-white border border-slate-200 rounded-2xl px-5 py-3 text-base sm:text-lg focus:ring-2 focus:ring-pink-500 outline-none transition-all"
            autocomplete="off">
        </div>
        <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-3">
            <select id="environmentSelect"
            class="flex-1 bg-white border border-slate-200 rounded-2xl px-5 py-3 text-base sm:text-lg focus:ring-2 focus:ring-pink-500 outline-none transition-all cursor-pointer">
            <option value="白天">☀️ 白天</option>
            <option value="夜晚">🌙 夜晚</option>
            <option value="黄昏">🌅 黄昏</option>
            <option value="阴天">☁️ 阴天</option>
        </select>
        <input type="number" id="numPrompts" min="1" max="50" value="10"
        class="flex-1 bg-white border border-slate-200 rounded-2xl px-5 py-3 text-base sm:text-lg focus:ring-2 focus:ring-pink-500 outline-none transition-all"
        placeholder="生成条数 (1-50)">
    </div>
    <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
        <button onclick="handleGenerate()" id="genBtn"
        class="flex-1 bg-pink-500 hover:bg-pink-600 text-white px-8 py-3.5 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 whitespace-nowrap active:scale-[0.97] shadow-lg shadow-pink-200">
        <i data-lucide="zap"></i> 生成提示词
    </button>
    <button onclick="clearAll()"
    class="flex-1 border border-slate-200 hover:bg-slate-50 text-slate-600 px-6 py-3.5 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 whitespace-nowrap active:scale-[0.97]">
    <i data-lucide="trash-2" class="w-4 h-4"></i> 清空结果
</button>
</div>
</div>
</header>

<section class="max-w-6xl mx-auto px-4 sm:px-6">
    <div id="statsBar" class="hidden text-center text-sm text-slate-400 mb-4 font-medium"></div>
    <div id="resultWrap" class="grid grid-cols-1 gap-4 sm:gap-6"></div>
    <div id="emptyState" class="text-center py-16 text-slate-400">
        <i data-lucide="sparkles" class="w-12 h-12 mx-auto mb-4 text-pink-300"></i>
        <p class="text-lg font-medium">输入行业名称，点击生成按钮</p>
        <p class="text-sm mt-1">每次都会生成全新的随机组合 ✨</p>
    </div>
</section>

<script>
    lucide.createIcons();

    const variants = [
        { zh: "极致极简主义标语", en: "Ultra-minimalist slogan" },
        { zh: "赛博朋克霓虹光感", en: "Cyberpunk neon lighting effect" },
        { zh: "日式原木风清新视觉", en: "Japanese wooden style fresh visual" },
        { zh: "莫兰迪色调高级灰", en: "Morandi color palette sophisticated gray" },
        { zh: "金属拉丝工业质感", en: "Brushed metal industrial texture" },
        { zh: "高饱和度波普视觉", en: "High-saturation Pop Art visual" },
        { zh: "无缝软膜背光工艺", en: "Seamless backlit soft film technology" },
        { zh: "悬浮感 3D 字效果", en: "Floating 3D lettering effect" },
        { zh: "奶油色调柔光处理", en: "Creamy tone soft light processing" },
        { zh: "实验室科技极白光", en: "Laboratory tech pure white light" },
    ];

    const storeSizes = [
        { zh: "小型店铺", en: "small store" },
        { zh: "中型店铺", en: "medium store" },
        { zh: "大型店铺", en: "large store" },
        { zh: "旗舰店", en: "flagship store" },
    ];

    const extraDetailsZH = [
        "精细亚克力面板", "隐藏式LED灯带", "高透光率软膜", "一体成型铝框",
        "防紫外线涂层", "哑光表面处理", "超薄边框设计", "均匀漫反射光源",
        "高显色指数灯光", "节能低功耗灯珠",
    ];
    const extraDetailsEN = [
        "fine acrylic panel", "concealed LED strip", "high-transmittance soft film",
        "one-piece aluminum frame", "UV-resistant coating", "matte surface finish",
        "ultra-thin bezel design", "uniform diffuse light source",
        "high CRI lighting", "energy-efficient low-power LEDs",
    ];

    // 硬性约束：无文字、无结构外露、无锈蚀
    const forbiddenZH = "禁止画面中出现任何文字、字母、数字、符号或标语。禁止外露任何搭建材质结构，包括但不限于桁架、钢管、支架、龙骨、焊接点、螺丝、挂钩、线槽、底座框架。所有内部骨架必须被装饰面完全包裹覆盖，从外部不可见任何支撑件或连接件。整体表面要求连续、无缝、无结构外露。禁止出现锈蚀纹理。禁止出现任何生锈、做锈、锈蚀、锈铁、铁锈、仿锈、旧化锈迹、工业锈感或类似表面处理。";
    const forbiddenEN = "Absolutely no text, letters, numbers, symbols, or slogans visible in the image. No exposed structural materials, including trusses, steel pipes, brackets, keels, welding points, screws, hooks, wire ducts, or base frames. All internal skeletons must be completely wrapped and covered by decorative surfaces, with no supports or connectors visible from the outside. The overall surface must be continuous, seamless, and free of any structural exposure. No rust textures. No rust, artificial rust, corrosion, oxidized iron, weathered rust, industrial rust feel, or similar surface treatments.";

    let promptsData = [];

    function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function showToast(message, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast ' + type + ' show';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 2200);
    }

    function handleGenerate() {
        const industry = document.getElementById("industryInput").value.trim();
        const env = document.getElementById("environmentSelect").value;
        let num = parseInt(document.getElementById("numPrompts").value);

        if (!industry) {
            showToast('⚠️ 请输入店铺行业名称', '');
            document.getElementById("industryInput").focus();
            return;
        }
        if (!num || num < 1) num = 10;
        if (num > 50) num = 50;

        document.getElementById("numPrompts").value = num;

        const btn = document.getElementById("genBtn");
        btn.classList.add('btn-generating');
        btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i> 生成中...';
        lucide.createIcons();

        // 构造 TEXT LOCK 字符串
        const textLockZH = `【TEXT LOCK】${industry}｜文字必须逐字完全一致，不允许任何改动或缺失｜清晰可读字体，禁止变形`;
        const textLockEN = `【TEXT LOCK】${industry} | Text must be EXACTLY identical, no changes, no missing text | Clear readable font, no deformation`;

        setTimeout(() => {
            promptsData = [];
            document.getElementById("resultWrap").innerHTML = "";
            document.getElementById("emptyState").classList.add("hidden");
            document.getElementById("statsBar").classList.remove("hidden");

            // 用于记录已生成的中文提示词，确保不重复
            const generatedSet = new Set();
            const maxAttempts = 200; // 防止死循环

            for (let i = 0; i < num; i++) {
                let zhPrompt = '';
                let enPrompt = '';
                let attempts = 0;
                let isUnique = false;

                // 随机组合直到生成不重复的提示词
                while (!isUnique && attempts < maxAttempts) {
                    const variant = pickRandom(variants);
                    const size = pickRandom(storeSizes);
                    const extraZH = pickRandom(extraDetailsZH);
                    const extraEN = pickRandom(extraDetailsEN);

                    zhPrompt =
                        `${env}环境，门头正立面，完整展示，正面平视，无透视畸变，${industry}店铺门头，${size.zh}，软膜灯箱、无边框型材、UV软膜、通体发光灯箱，品牌店名+${variant.zh}，${extraZH}，现代清晰字体，8K高清，商业写实效果图。${forbiddenZH} ${textLockZH}`;

                    enPrompt =
                        `${env} lighting, Storefront facade, front view, eye-level, NO perspective distortion, ${industry} store, ${size.en}, backlit soft film light box sign, UV soft film texture, frameless aluminum profile, brand logo + ${variant.en}, ${extraEN}, sharp modern fonts, 8k resolution, photorealistic commercial rendering. ${forbiddenEN} ${textLockEN}`;

                    if (!generatedSet.has(zhPrompt)) {
                        generatedSet.add(zhPrompt);
                        isUnique = true;
                    }
                    attempts++;
                }

                // 极端情况：如果尝试次数过多仍未找到唯一组合，仍使用最后一次生成的（理论上不会发生）
                const id = 'prompt-' + i + '-' + Date.now();
                promptsData.push({ id, zh: zhPrompt, en: enPrompt });

                const card = document.createElement("div");
                card.className = "prompt-card glass-card rounded-2xl overflow-hidden flex flex-col md:flex-row animate-fade-in";
                card.style.animationDelay = (i * 0.03) + 's';
                card.setAttribute('data-id', id);

                card.innerHTML = `
                <div class="flex-1 p-5 sm:p-6 border-b md:border-b-0 md:border-r border-slate-100/60">
                    <div class="flex justify-between items-center mb-3">
                        <span class="tag-zh text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide">CN / 中文版</span>
                        <div class="flex gap-1">
                            <button data-action="copy" data-lang="zh" data-id="${id}"
                            class="text-slate-400 hover:text-pink-500 transition p-1 rounded-md hover:bg-pink-50"
                            title="复制中文">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <p class="text-sm text-slate-600 leading-relaxed pr-1">${escapeHTML(zhPrompt)}</p>
            </div>
            <div class="flex-1 p-5 sm:p-6 bg-slate-50/50">
                <div class="flex justify-between items-center mb-3">
                    <span class="tag-en text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide">EN / AI Engine</span>
                    <div class="flex gap-1">
                        <button data-action="copy" data-lang="en" data-id="${id}"
                        class="text-slate-400 hover:text-indigo-500 transition p-1 rounded-md hover:bg-indigo-50"
                        title="Copy English">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <p class="text-sm text-slate-500 font-mono leading-relaxed pr-1">${escapeHTML(enPrompt)}</p>
        </div>
        `;
        document.getElementById("resultWrap").appendChild(card);
    }

    document.getElementById("statsBar").textContent =
        `📋 已生成 ${promptsData.length} 组不重复提示词 · ${env}环境 · ${industry} (文字已锁定)`;

    btn.classList.remove('btn-generating');
    btn.innerHTML = '<i data-lucide="zap"></i> 生成提示词';
    lucide.createIcons();

    document.getElementById("resultWrap").scrollIntoView({ behavior: 'smooth', block: 'start' });
}, 250);
}

function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

document.getElementById('resultWrap').addEventListener('click', function(e) {
    const btn = e.target.closest('button[data-action="copy"]');
    if (!btn) return;

    const lang = btn.getAttribute('data-lang');
    const id = btn.getAttribute('data-id');
    const prompt = promptsData.find(p => p.id === id);
    if (!prompt) return;

    const text = prompt[lang];
    copyToClipboard(text, btn);
});

function copyToClipboard(text, btnElement) {
    navigator.clipboard.writeText(text).then(() => {
        const iconEl = btnElement.querySelector('i');
        if (iconEl) {
            iconEl.setAttribute('data-lucide', 'check');
            iconEl.classList.add('text-green-500');
            lucide.createIcons();
            setTimeout(() => {
                iconEl.setAttribute('data-lucide', 'copy');
                iconEl.classList.remove('text-green-500');
                lucide.createIcons();
            }, 1800);
        }
        showToast('✅ 已复制到剪贴板', 'success');
    }).catch(() => {
        showToast('❌ 复制失败，请手动选中复制', '');
    });
}

function copyAll(type) {
    if (promptsData.length === 0) {
        showToast('⚠️ 请先生成提示词', '');
        return;
    }
    const text = promptsData.map(p => p[type]).join('\n\n');
    navigator.clipboard.writeText(text).then(() => {
        const label = type === 'zh' ? '中文' : '英文';
        showToast(`✅ 已复制全部 ${promptsData.length} 组${label}提示词`, 'success');
    }).catch(() => {
        showToast('❌ 复制失败，请重试', '');
    });
}

function exportAll() {
    if (promptsData.length === 0) {
        showToast('⚠️ 请先生成提示词', '');
        return;
    }
    const industry = document.getElementById("industryInput").value.trim() || 'unknown';
    const env = document.getElementById("environmentSelect").value;
    const timestamp = new Date().toISOString().slice(0, 10);
    let content = `古月AI智能体·彩色软膜灯箱灵感库\n`;
    content += `行业: ${industry} | 环境: ${env} | 生成时间: ${timestamp}\n`;
    content += `共 ${promptsData.length} 组提示词 (已去重)\n`;
    content += `========================================\n\n`;

    promptsData.forEach((p, i) => {
        content += `--- 第 ${i + 1} 组 ---\n`;
        content += `[中文]:\n${p.zh}\n\n`;
        content += `[English]:\n${p.en}\n\n`;
        content += `----------------------------------------\n\n`;
    });

    const blob = new Blob([content], { type: 'text/plain;charset=UTF-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `软膜灯箱_${industry}_${timestamp}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('📥 导出成功！', 'success');
}

function clearAll() {
    if (promptsData.length === 0) return;
    promptsData = [];
    document.getElementById("resultWrap").innerHTML = "";
    document.getElementById("emptyState").classList.remove("hidden");
    document.getElementById("statsBar").classList.add("hidden");
    showToast('🗑️ 已清空全部结果', '');
}

document.getElementById('industryInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        handleGenerate();
    }
});

lucide.createIcons();
</script>
</body>
</html>
