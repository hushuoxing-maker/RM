<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古月·双语 AIGC 商业门头大师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', "PingFang SC", "Microsoft YaHei", sans-serif; background: #fdfcfd; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .prompt-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .prompt-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(236, 72, 153, 0.1); }
        .tag-en { background: #EEF2FF; color: #4F46E5; }
        .tag-zh { background: #FFF1F2; color: #E11D48; }
    </style>
</head>
<body class="pb-20 text-slate-800">

    <nav class="sticky top-0 z-50 glass-card border-b border-pink-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-br from-pink-500 to-violet-600 p-1.5 rounded-lg text-white"><i data-lucide="layout-dashboard"></i></div>
                <h1 class="font-extrabold text-xl tracking-tight italic">GUYUE <span class="text-pink-500 text-sm font-normal not-italic">BI-LINGUAL</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="copyAll('zh')" class="text-xs font-bold border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50">复制全部中文</button>
                <button onclick="copyAll('en')" class="text-xs font-bold bg-slate-900 text-white px-3 py-2 rounded-lg hover:bg-slate-800">COPY ALL ENGLISH</button>
            </div>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto px-6 pt-12 text-center">
        <div class="inline-block px-4 py-1.5 mb-4 rounded-full bg-pink-50 text-pink-600 text-xs font-bold tracking-widest uppercase">Premium Design Assets</div>
        <h2 class="text-4xl font-extrabold mb-6 tracking-tight text-slate-900">双语全能提示词生成器</h2>
        
        <div class="glass-card rounded-3xl p-6 shadow-xl mb-12">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="industryInput" placeholder="请输入店铺行业（如：日式拉面、精品美容院...）" 
                    class="flex-grow bg-white border border-slate-200 rounded-2xl px-6 py-4 text-lg focus:ring-2 focus:ring-pink-500 outline-none transition-all">
                <button onclick="handleGenerate()" id="genBtn" class="bg-pink-500 hover:bg-pink-600 text-white px-10 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 whitespace-nowrap">
                    <i data-lucide="zap"></i> 生成双语提案
                </button>
            </div>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6">
        <div id="resultWrap" class="grid grid-cols-1 gap-6">
            </div>
    </section>

    <script>
        lucide.createIcons();
        let promptsData = [];

        const variants = [
            { zh: "极致极简主义标语", en: "Ultra-minimalist slogan" },
            { zh: "赛博朋克霓虹光感", en: "Cyberpunk neon lighting effect" },
            { zh: "日式原木风清新视觉", en: "Japanese wooden style fresh visual" },
            { zh: "莫兰迪色调高级灰", en: "Morandi color palette sophisticated gray" },
            { zh: "金属拉丝工业质感", en: "Brushed metal industrial texture" },
            { zh: "高饱和度波普视觉", en: "High-saturation Pop Art visual" },
            { zh: "无缝软膜背光工艺", en: "Seamless backlit soft film technology" },
            { zh: "悬浮感 3D 字效果", en: "Floating 3D lettering effect" },
            { zh: "奶油色调柔光处理", en: "Creamy tone soft light processing" },
            { zh: "实验室科技极白光", en: "Laboratory tech pure white light" }
        ];

        function handleGenerate() {
            const industry = document.getElementById("industryInput").value.trim();
            const resultWrap = document.getElementById("resultWrap");
            if (!industry) return alert("请输入行业名称");

            resultWrap.innerHTML = "";
            promptsData = [];

            variants.forEach((v, i) => {
                const zhPrompt = `白天自然光，门头正立面，完整展示，正面平视视角，无透视畸变，软膜灯箱门头，整体发光、视觉统一、明亮吸睛，${industry}店铺门头，软膜灯箱、无边框型材、UV软膜、通体发光灯箱，品牌店名+${v.zh}，现代清晰字体，8K高清，商业写实效果图。`;
                const enPrompt = `Daylight, Storefront facade, front view, eye-level, NO distortion, backlit soft film light box sign, ${industry} store, ultra-bright uniform lighting, UV soft film texture, frameless aluminum profile, brand logo + ${v.en}, sharp modern fonts, 8k, photorealistic.`;
                
                promptsData.push({ zh: zhPrompt, en: enPrompt });

                const card = document.createElement('div');
                card.className = "prompt-card glass-card rounded-2xl overflow-hidden flex flex-col md:flex-row";
                card.innerHTML = `
                    <div class="flex-1 p-6 border-b md:border-b-0 md:border-r border-slate-100">
                        <div class="flex justify-between items-center mb-3">
                            <span class="tag-zh text-[10px] font-bold px-2 py-0.5 rounded uppercase">CN / 中文版</span>
                            <button onclick="copyText('${zhPrompt}', this)" class="text-slate-400 hover:text-pink-500 transition"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                        <p class="text-sm text-slate-600 leading-relaxed">${zhPrompt}</p>
                    </div>
                    <div class="flex-1 p-6 bg-slate-50/50">
                        <div class="flex justify-between items-center mb-3">
                            <span class="tag-en text-[10px] font-bold px-2 py-0.5 rounded uppercase">EN / AI Engine</span>
                            <button onclick="copyText('${enPrompt.replace(/'/g, "\\'")}', this)" class="text-slate-400 hover:text-pink-500 transition"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                        <p class="text-sm text-slate-500 font-mono leading-relaxed">${enPrompt}</p>
                    </div>
                `;
                resultWrap.appendChild(card);
            });
            lucide.createIcons();
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-500"></i>`;
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = icon; lucide.createIcons(); }, 2000);
            });
        }

        function copyAll(type) {
            const text = promptsData.map(p => p[type]).join("\n\n");
            navigator.clipboard.writeText(text).then(() => alert(`✅ 已一键复制全部 10 组${type === 'zh' ? '中文提示词' : '英文提示词'}`));
        }
    </script>
</body>
</html>
